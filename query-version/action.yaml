name: Query Azure DevOps Extension Version
description: Query extension version from marketplace with optional version increment logic
author: Jesse Houwing
branding:
  icon: search
  color: blue
inputs:
  auth-type:
    description: |-
      Authentication type: 'pat', 'basic', or 'oidc'

      Available for: install, publish, query-version, share, show, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: none.
      Default: pat

      - pat: Use Personal Access Token (recommended for most users)
      - basic: Use username/token authentication (for on-premises Azure DevOps Server)
      - oidc: Use Azure OIDC via azure/login action (requires setup, see below)

      PAT Setup:
      Provide a Personal Access Token via the 'token' input

      Basic Auth Setup:
      Provide username and token via 'username' and 'token' inputs

      OIDC Setup:
      Run azure/login action BEFORE this action:

      - uses: azure/login@v2
        with:
          client-id: $``{{ secrets.AZURE_CLIENT_ID }}
          tenant-id: $``{{ secrets.AZURE_TENANT_ID }}
          subscription-id: $``{{ secrets.AZURE_SUBSCRIPTION_ID }}

      Then use auth-type: oidc (no token needed)

      See: https://jessehouwing.net/authenticate-connect-mggraph-using-oidc-in-github-actions/
    required: false
    default: pat
  token:
    description: |-
      Token for marketplace authentication

      Available for: install, publish, query-version, share, show, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: none.
      Default: none

      Required when auth-type is 'pat' or 'basic'
      For basic auth, provide the username in `username` and the secret in `token`

      Required scopes: Marketplace (Publish)
      Create a PAT at: https://dev.azure.com/_usersSettings/tokens
    required: false
  username:
    description: |-
      Username for basic authentication

      Available for: install, publish, query-version, share, show, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: none.
      Default: none

      Required when auth-type is 'basic'
      Not needed for other auth types

      Use for on-premises TFS or Azure DevOps Server deployments
    required: false
  service-url:
    description: |-
      Azure DevOps service URL (optional)

      Available for: publish, query-version, share, show, unpublish, unshare, wait-for-validation.
      Required for: none.
      Default: none

      - Defaults to marketplace URL for cloud operations
      - Recommended cloud format: `https://dev.azure.com/<organization>`
      - Azure DevOps Server/TFS URLs are also supported
      - Specify custom URL for on-premises Azure DevOps Server
      - Must be HTTPS and valid Azure DevOps domain

      Examples:
      - https://marketplace.visualstudio.com (default)
      - https://dev.azure.com/myorg
      - https://myserver.com/Collection
      - https://myserver.com/tfs/Collection

      Optional for: publish, share, unshare, show, query-version, wait-for-validation
    required: false
  tfx-version:
    description: |-
      **Version of tfx-cli to use:**

      Available for: install, package, publish, query-version, share, show, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: none.
      Default: built-in

      - `built-in` (default): Use bundled tfx-cli JS entrypoint
      - `path`: Use tfx-cli from system PATH (provided by your environment)
      - Version spec: Download specific version from npm (e.g., `^0.17`, `0.17.0`, `latest`)

      **Examples:** `built-in`, `path`, `^0.17`, `latest`
    required: false
    default: built-in
  publisher-id:
    description: |-
      **Publisher ID** that owns the extension.

      Available for: install, package, publish, query-version, share, show, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: show.
      Default: none

      - Must match publisher in manifest (or override it)
      - Required for command: show.
      - Optional for install/share/unpublish/unshare/wait-for-validation/query-version:
        falls back to value from manifest-file or vsix-file when not specified.
      - Alphanumeric with hyphens, dots, underscores only

      **Example:** `mycompany` or `my-publisher-id`
    required: false
  extension-id:
    description: |-
      **Extension ID** - unique identifier within the publisher namespace.

      Available for: install, package, publish, query-version, share, show, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: show.
      Default: none

      - Must match ID in manifest (or override it)
      - Combined with Publisher ID forms full identifier: `publisherId.extensionId`
      - Required for command: show.
      - Optional for install/share/unpublish/unshare/wait-for-validation/query-version:
        falls back to value from manifest-file or vsix-file when not specified.
      - Alphanumeric with hyphens, dots, underscores only

      **Example:** `my-extension` or `azure-devops-tasks`
    required: false
  version-source:
    description: |-
      **Version sources** to consider (newline-separated). Highest valid semver wins.

      Available for: query-version.
      Required for: none.
      Default: marketplace

      Each line is one of:
      - `marketplace`: Query marketplace version (applies marketplace-version-action)
      - `manifest`: Read version from vss-extension.json
      - `vsix`: Read version from VSIX file
      - A semver literal (e.g. `1.0.0`)
      - Anything else is skipped (handles empty expressions, unresolved variables)

      The highest valid version across all sources wins.
      When `marketplace` is not listed, authentication is not required.

      **Examples:**
      ```yaml
      # Auto-increment marketplace (default behavior)
      version-source: marketplace

      # First publish with fallback
      version-source: |
        marketplace
        1.0.0

      # GitVersion integration
      version-source: |
        $``{{ steps.gitversion.outputs.semVer }}
        marketplace

      # Manual dispatch override
      version-source: |
        $``{{ inputs.version }}
        marketplace
      ```
    required: false
    default: marketplace
  marketplace-version-action:
    description: |-
      **Action to apply to the marketplace version**.

      Available for: query-version.
      Required for: none.
      Default: None

      Only applies when `marketplace` is listed in `version-source`.

      - `None`: Use the current latest marketplace version as-is
      - `Major`: Increment major and reset minor/patch
      - `Minor`: Increment minor and reset patch
      - `Patch`: Increment patch

      **Example:** If latest is `1.2.3` and action is `Minor`, result is `1.3.0`
    required: false
    default: None
  manifest-file:
    description: |-
      **Manifest file path(s)** (newline-separated).

      Available for: install, package, publish, query-version, share, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: none.
      Default: none

      - Defaults to `vss-extension.json` if not specified
      - Can specify multiple manifest files
      - Patterns are relative to the current working directory
      - For install/share/unpublish/unshare/wait-for-validation/query-version:
        used as fallback source for publisher-id and extension-id when not specified

      **Example:**
      ```
      vss-extension.json
      manifests/dev/vss-extension.json
      manifests/prod/vss-extension.json
      ```
    required: false
  use:
    description: |-
      **Input source for publish and query-version operations:**

      Available for: publish, query-version.
      Required for: none.
      Default: none

      - `manifest` (default): Use manifest files as the input source
      - `vsix`: Use a pre-built .vsix package as the input source

      **Use VSIX when:** You've already packaged the extension separately
    required: false
  vsix-file:
    description: |-
      **Path to .vsix file** for auto-extracting task versions.

      Available for: install, publish, query-version, share, unpublish, unshare, wait-for-installation, wait-for-validation.
      Required for: none.
      Default: none

      - Reads extension identity (publisher-id and extension-id) when not specified
      - For wait-for-installation: extracts task.json files from VSIX package
      - Most convenient when verifying immediately after packaging

      **Note:** Use this OR expected-tasks/manifest-file, not multiple
    required: false
outputs:
  proposed-version:
    description: |
      **Proposed extension version** — the highest version from all sources (query-version operation only).
    value: ${{ steps.query-version.outputs.proposed-version }}
  current-version:
    description: |
      **Current winning version** before applying version action (query-version operation only).

      This value reflects the same version chosen for `proposed-version` before any increment is applied:
      - When `version-source` includes `marketplace`, this is the current marketplace version
      - Otherwise, it is the current version from the winning source (manifest, vsix, or literal)
    value: ${{ steps.query-version.outputs.current-version }}
  version-source:
    description: |
      **Source that provided the winning version** (query-version operation only).
      One of: `marketplace`, `manifest`, `vsix`, or `literal`.
    value: ${{ steps.query-version.outputs.version-source }}
runs:
  using: composite
  steps:
    - id: query-version
      uses: jessehouwing/azdo-marketplace@main
      with:
        operation: query-version
        auth-type: ${{ inputs.auth-type }}
        token: ${{ inputs.token }}
        username: ${{ inputs.username }}
        service-url: ${{ inputs.service-url }}
        tfx-version: ${{ inputs.tfx-version }}
        publisher-id: ${{ inputs.publisher-id }}
        extension-id: ${{ inputs.extension-id }}
        version-source: ${{ inputs.version-source }}
        marketplace-version-action: ${{ inputs.marketplace-version-action }}
        manifest-file: ${{ inputs.manifest-file }}
        use: ${{ inputs.use }}
        vsix-file: ${{ inputs.vsix-file }}
