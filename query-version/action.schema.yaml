# Schema for action-example-checker
# See: https://github.com/jessehouwing/actions-example-checker

# Define reusable custom types
types:
  url:
    type: string
    match: '^https?://.*'
  semver:
    type: string
    match: '^\d+\.\d+\.\d+$'
  identifier:
    type: string
    match: '^[a-zA-Z0-9._-]+$'
  version-source-entry:
    type: string
    match: '^(marketplace|manifest|vsix|\d+\.\d+\.\d+|\$\{\{.*\}\})$'

# Validate inputs
inputs:
  auth-type:
    type: choice
    options:
      - pat
      - basic
      - oidc

  token:
    type: string

  username:
    type: string

  service-url:
    type: url

  tfx-version:
    type: string

  publisher-id:
    type: identifier

  extension-id:
    type: identifier

  version-source:
    type: string
    separators: newline
    items:
      type: version-source-entry

  marketplace-version-action:
    type: choice
    options:
      - None
      - Major
      - Minor
      - Patch

  manifest-file:
    type: string

  use:
    type: choice
    options:
      - manifest
      - vsix

  vsix-file:
    type: string

# Validate outputs
outputs:
  current-version:
    type: semver

  proposed-version:
    type: semver

  version-source:
    type: choice
    options:
      - marketplace
      - manifest
      - vsix
      - literal
